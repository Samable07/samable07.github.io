<!DOCTYPE html>
<html>
<head>
    <title>Samable的博客文章</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
    <link rel="stylesheet" href="/assets/css/tag.css" type="text/css">
    <link rel="stylesheet" href="/assets/css/markdownstyle.css" type="text/css">
    <!-- 引入 marked.js 使用本地版本 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
    <script src="/marked.min.js"></script>   
    <!--引入自定义 markdown-->
    <script src="/markdown_ex.js"></script>
    <!-- 引入jquery-->
    <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
</head>
<body>
    <!--返回按钮-->
    <div style="display: flex; align-items: center; gap: 5px;">
    <div class="back-btn" id="back-btn"><img src="/assets/images/back.png" width="35px" height="35px" style="margin-top: 9px; margin-left: 9px;"></div>
    <script>
    document.getElementById("back-btn").addEventListener("click", function() {
        // alert("按钮被点击了");
        window.location.href = `/`;
    })
    </script>

    <div class="page-title" id="page-title"></div>
    </div>

    <div id="tags"></div>
    <div class="blog-time" id="time"></div>
    <div class="blog-content" id="content"></div>

    <script type="application/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const receivedID = urlParams.get('blog');
    
    // 文章时间的div
    function createTime(publish, update) {
    return `
        <div class="timecontainer">
            <div style="display: flex;flex-wrap: nowrap;">
            <div class="btn-found-date-text">创建日期: ${publish}</div>
            <div class="btn-found-date-text" style="margin-left: 20px;">更新日期: ${update}</div>
            </div>
            <hr style="display: reset;"></hr>
        </div>
    `;
    }

    // 获取JSON数据
    function fetchtitle() {
    return new Promise((resolve, reject) => {
        $.ajax({
            url: "articleinfo.json",  // 保持原样，先不改
            type: "GET",
            dataType: "json",
            success: resolve,
            error: reject
            })
        })
    }

    // 加载 Markdown 文件并渲染
    fetchtitle()
        .then(data => {
            console.log(data); // 成功获取数据
            const targetItem = data.find(item => item.id === Number(receivedID));
            if (targetItem) {
                console.log(targetItem.title);
                let article_title = targetItem.title;
                let article_filename = targetItem.filename;
                let article_publish = targetItem.publish;
                let article_update = targetItem.update;
                let article_tags = targetItem.tag;
                // 页面处理
                document.title = "Samable的博客文章-" + article_title;
                document.getElementById('page-title').innerHTML = article_title;  // 只改这里
                // tag处理
                if (article_tags !== null && article_tags.length > 0){ // 增加长度判断
                    let tag_div = "";
                    for (const tag of article_tags){
                        console.log(tag);
                        tag_div += `<div class="article-tag"> ${tag} </div>`;
                    }
                    console.log(tag_div)
                    document.getElementById('tags').innerHTML = `<div class="blog-tag-container" id="tag-container">${tag_div}</div>`;                    
                }
                
                // 保持原有的逻辑，只修复编码问题
                if (article_title.includes("#")){
                    const fileName = article_filename + ".md";
                    const encodedFileName = encodeURIComponent(fileName);
                    fetch('./' + encodedFileName)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('文件加载失败: ' + response.status);
                        }
                        return response.text();
                    })
                    .then(md => {
                        // 写日期
                        const timecontainer = document.getElementById("time");
                        let htmlContent = createTime(article_publish, article_update);
                        timecontainer.innerHTML = htmlContent;
                        // 写内容
                        document.getElementById('content').innerHTML = marked.parse(md);
                    })
                    .catch(error => {
                        console.error("加载文章失败:", error);
                        document.getElementById('content').innerHTML = `
                            <h1>加载失败</h1>
                            <p>文章内容加载失败，请稍后重试。</p>
                            <p>错误信息: ${error.message}</p>
                        `;
                    });
                }else{
                    fetch('./' + article_filename + '.md')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('文件加载失败: ' + response.status);
                            }
                            return response.text();
                        })
                        .then(md => {
                            // 写日期
                            const timecontainer = document.getElementById("time");
                            let htmlContent = createTime(article_publish, article_update);
                            timecontainer.innerHTML = htmlContent;
                            // 写内容
                            document.getElementById('content').innerHTML = marked.parse(md);
                        })
                        .catch(error => {
                            console.error("加载文章失败:", error);
                            document.getElementById('content').innerHTML = `
                                <h1>加载失败</h1>
                                <p>文章内容加载失败，请稍后重试。</p>
                                <p>错误信息: ${error.message}</p>
                            `;
                        });                    
                }

            } else {
                console.log("未找到数据");
                document.getElementById('content').innerHTML = `
                <h1>Noooooooooo...</h1>
                <p>你寻找的页面不存在...</p>
                `;
            }
        })
        .catch(error => {
            console.error("加载失败:", error);
            document.getElementById('content').innerHTML = `
                <h1>数据加载失败</h1>
                <p>Oh,Noooooooooooooooooooooooooooo...</p>
            `;
        });
    </script>

<!-- 页脚 -->

</div>

</body>

</html>
